<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garden Upgrades</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      color: #333;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .card {
      background: #ffffff;
      padding: 20px;
      border-radius: 12px;
    }

    .image-block {
      margin-bottom: 25px;
    }

    .image-block img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
    }

    .label {
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .before {
      background: #ffe600;
      color: #000;
    }

    .after {
      background: #4caf50;
      color: #fff;
    }

    /* Desktop layout */
    @media (min-width: 768px) {
      .card {
        display: flex;
        gap: 20px;
      }

      .image-block {
        flex: 1;
        margin-bottom: 0;
      }
    }
  </style>
</head>
<body>

  <section class="container">
    <h1>Garden Upgrades</h1>
    <p>A selection of garden spaces before and after managed upgrade works.</p>

    <div class="card">
      <div class="image-block">
        <img src="images/before.jpg" alt="Garden before upgrade" loading="lazy">
        <p><span class="label before">Before:</span> Garden space before managed upgrade works.</p>
      </div>

      <div class="image-block">
        <img src="images/after.jpg" alt="Garden after upgrade" loading="lazy">
        <p><span class="label after">After:</span> Same space following a complete garden upgrade.</p>
      </div>
    </div>
  </section>

</body>
</html>
